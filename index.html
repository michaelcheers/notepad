<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1b1e;
            --surface: #222327;
            --surface-2: #2a2b30;
            --border: #333438;
            --text: #c8c9cd;
            --text-dim: #6e7076;
            --accent: #e8a64e;
            --accent-dim: rgba(232, 166, 78, 0.12);
            --toolbar-h: 46px;
            --statusbar-h: 28px;
            --tab-h: 36px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ── Toolbar ── */
        .toolbar {
            height: var(--toolbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 2px;
            flex-shrink: 0;
        }

        .toolbar button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .toolbar button:hover { background: var(--surface-2); color: var(--text); }
        .toolbar button:active { transform: scale(0.97); }

        .toolbar button svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
        }

        .toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
        .toolbar .spacer { flex: 1; }

        .toolbar .title-area {
            display: flex; align-items: center; gap: 8px;
            flex: 1; min-width: 0; justify-content: center;
        }

        .toolbar .title-area .filename {
            font-size: 13px; font-weight: 500; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .toolbar .title-area .modified-dot {
            width: 7px; height: 7px; background: var(--accent);
            border-radius: 50%; flex-shrink: 0; opacity: 0; transition: opacity 0.2s;
        }
        .toolbar .title-area .modified-dot.show { opacity: 1; }

        /* ── Tab bar ── */
        .tab-bar {
            height: var(--tab-h);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: flex-end;
            padding: 0 8px; gap: 1px;
            overflow-x: auto; flex-shrink: 0;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            height: 30px; padding: 0 14px;
            background: transparent; border: none;
            color: var(--text-dim); font-family: inherit;
            font-size: 12px; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            border-radius: 6px 6px 0 0; transition: all 0.15s;
            white-space: nowrap; flex-shrink: 0;
        }
        .tab:hover { color: var(--text); background: var(--surface-2); }
        .tab.active { background: var(--surface); color: var(--text); }

        .tab .close-tab {
            width: 16px; height: 16px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.1s; font-size: 11px;
        }
        .tab:hover .close-tab { opacity: 0.5; }
        .tab .close-tab:hover { opacity: 1; background: rgba(255,255,255,0.1); }

        .tab .tab-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: none; }
        .tab.modified .tab-dot { display: block; }

        /* ── Editor area ── */
        .editor-wrap { flex: 1; position: relative; overflow: hidden; }
        #monaco-container { width: 100%; height: 100%; }

        /* ── Welcome ── */
        .welcome {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; pointer-events: none; z-index: 5;
        }
        .welcome.hidden { display: none; }
        .welcome .icon { width: 56px; height: 56px; background: var(--accent-dim); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .welcome .icon svg { width: 28px; height: 28px; stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .welcome p { color: var(--text-dim); font-size: 13px; }
        .welcome p strong { color: var(--text); font-weight: 500; }
        .welcome .keys { display: flex; gap: 20px; margin-top: 4px; }
        .welcome .keys span { font-size: 12px; color: var(--text-dim); }
        .welcome .keys kbd { background: var(--border); padding: 2px 7px; border-radius: 4px; font-family: monospace; font-size: 11px; color: var(--text); margin-right: 3px; }

        /* ── Status bar ── */
        .status-bar {
            height: var(--statusbar-h);
            background: var(--surface-2);
            border-top: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 12px; gap: 16px;
            font-size: 11.5px; color: var(--text-dim);
            flex-shrink: 0;
        }
        .status-bar .spacer { flex: 1; }
        .status-bar span { display: flex; align-items: center; gap: 4px; }

        .status-bar .lang-select {
            background: transparent;
            color: var(--text-dim);
            border: none;
            font-family: inherit;
            font-size: 11.5px;
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 3px;
            outline: none;
        }
        .status-bar .lang-select:hover { background: var(--surface); color: var(--text); }
        .status-bar .lang-select option { background: var(--surface-2); color: var(--text); }

        /* ── Drop overlay ── */
        .drop-overlay { position: fixed; inset: 0; background: rgba(26,27,30,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .drop-overlay.show { display: flex; }
        .drop-overlay .inner { border: 2px dashed var(--accent); border-radius: 16px; padding: 60px 80px; text-align: center; }
        .drop-overlay .inner p { color: var(--accent); font-size: 18px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="newFile()" title="New file (Ctrl+N)">
            <svg><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            New
        </button>
        <button onclick="openFile()" title="Open file (Ctrl+O)">
            <svg><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Open
        </button>
        <button onclick="saveFile()" title="Save file (Ctrl+S)">
            <svg><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
        </button>
        <button onclick="saveFileAs()" title="Save as (Ctrl+Shift+S)">
            <svg><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save As
        </button>
        <div class="sep"></div>
        <button onclick="toggleWrap()" id="wrap-btn" title="Toggle word wrap">
            <svg><path d="M3 6h18"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><polyline points="13 16 11 18 13 20"/><path d="M3 18h7"/></svg>
            Wrap
        </button>
        <button onclick="toggleMinimap()" id="minimap-btn" title="Toggle minimap">
            <svg><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Minimap
        </button>
        <div class="title-area">
            <span class="filename" id="title-filename">Notepad</span>
            <span class="modified-dot" id="modified-dot"></span>
        </div>
        <div class="spacer"></div>
    </div>

    <div class="tab-bar" id="tab-bar"></div>

    <div class="editor-wrap">
        <div id="monaco-container"></div>
        <div class="welcome" id="welcome">
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <p><strong>Open a file</strong> or start typing</p>
            <div class="keys">
                <span><kbd>Ctrl</kbd><kbd>O</kbd> Open</span>
                <span><kbd>Ctrl</kbd><kbd>S</kbd> Save</span>
                <span><kbd>Alt</kbd><kbd>Shift</kbd><kbd>Click</kbd> Multi-cursor</span>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="status-pos">Ln 1, Col 1</span>
        <span id="status-sel"></span>
        <span id="status-lines">0 lines</span>
        <span id="status-size"></span>
        <div class="spacer"></div>
        <span id="status-encoding">UTF-8</span>
        <span id="status-indent">Spaces: 4</span>
        <select class="lang-select" id="lang-select" title="Select language"></select>
    </div>

    <div class="drop-overlay" id="drop-overlay">
        <div class="inner"><p>Drop file to open</p></div>
    </div>

    <input type="file" id="file-picker" multiple style="display:none">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        // ── Monaco loader ──
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

        // Proxy for web workers from CDN
        window.MonacoEnvironment = {
            getWorkerUrl: function (workerId, label) {
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                    self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/' };
                    importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/base/worker/workerMain.js');
                `)}`;
            }
        };

        require(['vs/editor/editor.main'], function () {
            initApp();
        });

        // ── State ──
        let editor = null;
        const tabs = [];
        let activeTabId = null;
        let tabIdCounter = 0;
        let wordWrap = false;
        let minimapEnabled = false;
        const supportsFS = 'showOpenFilePicker' in window;

        const tabBar = document.getElementById('tab-bar');
        const welcomeEl = document.getElementById('welcome');
        const modifiedDot = document.getElementById('modified-dot');
        const titleFilename = document.getElementById('title-filename');
        const filePicker = document.getElementById('file-picker');
        const dropOverlay = document.getElementById('drop-overlay');
        const langSelect = document.getElementById('lang-select');

        // Extension → Monaco language ID
        const extToLang = {
            js: 'javascript', mjs: 'javascript', cjs: 'javascript', gs: 'javascript',
            ts: 'typescript', mts: 'typescript', cts: 'typescript',
            jsx: 'javascript', tsx: 'typescript',
            html: 'html', htm: 'html',
            css: 'css', scss: 'scss', less: 'less',
            json: 'json', jsonc: 'json',
            xml: 'xml', xsl: 'xml', xsd: 'xml', svg: 'xml', xhtml: 'xml',
            md: 'markdown', mdx: 'markdown',
            py: 'python', pyw: 'python', pyi: 'python',
            rb: 'ruby', rake: 'ruby', gemspec: 'ruby',
            php: 'php', phtml: 'php',
            java: 'java',
            c: 'c', h: 'c',
            cpp: 'cpp', cc: 'cpp', cxx: 'cpp', hpp: 'cpp', hh: 'cpp', hxx: 'cpp',
            cs: 'csharp', cshtml: 'razor',
            go: 'go',
            rs: 'rust',
            swift: 'swift',
            kt: 'kotlin', kts: 'kotlin',
            scala: 'scala',
            dart: 'dart',
            lua: 'lua',
            r: 'r', R: 'r',
            pl: 'perl', pm: 'perl',
            sh: 'shell', bash: 'shell', zsh: 'shell', fish: 'shell',
            ps1: 'powershell', psm1: 'powershell',
            bat: 'bat', cmd: 'bat',
            sql: 'sql',
            graphql: 'graphql', gql: 'graphql',
            yaml: 'yaml', yml: 'yaml',
            toml: 'ini',
            ini: 'ini', cfg: 'ini', conf: 'ini',
            env: 'ini',
            dockerfile: 'dockerfile',
            makefile: 'makefile',
            cmake: 'cmake',
            tf: 'hcl', hcl: 'hcl',
            proto: 'protobuf',
            vue: 'html',
            svelte: 'html',
            astro: 'html',
            ex: 'elixir', exs: 'elixir',
            erl: 'erlang', hrl: 'erlang',
            hs: 'haskell', lhs: 'haskell',
            ml: 'ocaml', mli: 'ocaml',
            fs: 'fsharp', fsx: 'fsharp', fsi: 'fsharp',
            clj: 'clojure', cljs: 'clojure', cljc: 'clojure', edn: 'clojure',
            lisp: 'scheme', cl: 'scheme', scm: 'scheme',
            zig: 'zig',
            nim: 'nim',
            v: 'v',
            sol: 'sol',
            wgsl: 'wgsl',
            glsl: 'glsl', vert: 'glsl', frag: 'glsl',
            m: 'objective-c', mm: 'objective-c',
            pas: 'pascal', pp: 'pascal',
            asm: 'asm', s: 'asm',
            txt: 'plaintext', text: 'plaintext', log: 'plaintext',
            csv: 'plaintext', tsv: 'plaintext',
            tex: 'latex', latex: 'latex',
            bib: 'bibtex',
            diff: 'diff', patch: 'diff',
            gitignore: 'ignore',
            dockerignore: 'ignore',
            editorconfig: 'ini',
        };

        // Also handle special filenames
        const nameToLang = {
            'Makefile': 'makefile',
            'Dockerfile': 'dockerfile',
            'Jenkinsfile': 'groovy',
            'Vagrantfile': 'ruby',
            'Gemfile': 'ruby',
            'Rakefile': 'ruby',
            'CMakeLists.txt': 'cmake',
            '.gitignore': 'ignore',
            '.dockerignore': 'ignore',
            '.editorconfig': 'ini',
            '.env': 'ini',
            '.env.local': 'ini',
            '.eslintrc': 'json',
            '.prettierrc': 'json',
            '.babelrc': 'json',
            'tsconfig.json': 'json',
            'package.json': 'json',
        };

        function getLangForFile(name) {
            if (nameToLang[name]) return nameToLang[name];
            const ext = getExtension(name);
            return extToLang[ext] || 'plaintext';
        }

        function initApp() {
            // Define custom theme
            monaco.editor.defineTheme('notepad-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '5c6370', fontStyle: 'italic' },
                    { token: 'keyword', foreground: 'e8a64e' },
                    { token: 'keyword.control', foreground: 'e8a64e' },
                    { token: 'string', foreground: '98c379' },
                    { token: 'string.escape', foreground: '56b6c2' },
                    { token: 'number', foreground: 'd19a66' },
                    { token: 'constant', foreground: 'd19a66' },
                    { token: 'type', foreground: 'c678dd' },
                    { token: 'type.identifier', foreground: 'c678dd' },
                    { token: 'class', foreground: 'c678dd' },
                    { token: 'function', foreground: '61afef' },
                    { token: 'variable', foreground: 'c8c9cd' },
                    { token: 'variable.predefined', foreground: 'e06c75' },
                    { token: 'operator', foreground: 'c8c9cd' },
                    { token: 'delimiter', foreground: 'abb2bf' },
                    { token: 'delimiter.bracket', foreground: 'abb2bf' },
                    { token: 'tag', foreground: 'e06c75' },
                    { token: 'attribute.name', foreground: 'd19a66' },
                    { token: 'attribute.value', foreground: '98c379' },
                    { token: 'metatag', foreground: 'e8a64e' },
                    { token: 'annotation', foreground: 'c678dd' },
                    { token: 'regexp', foreground: '56b6c2' },
                    { token: 'predefined', foreground: '56b6c2' },
                    { token: 'invalid', foreground: 'e06c75' },
                ],
                colors: {
                    'editor.background': '#222327',
                    'editor.foreground': '#c8c9cd',
                    'editor.lineHighlightBackground': '#ffffff08',
                    'editor.selectionBackground': '#e8a64e40',
                    'editor.inactiveSelectionBackground': '#e8a64e20',
                    'editor.selectionHighlightBackground': '#e8a64e18',
                    'editorCursor.foreground': '#e8a64e',
                    'editorLineNumber.foreground': '#6e7076',
                    'editorLineNumber.activeForeground': '#c8c9cd',
                    'editorGutter.background': '#222327',
                    'editorIndentGuide.background': '#333438',
                    'editorIndentGuide.activeBackground': '#4e4f54',
                    'editorBracketMatch.background': '#e8a64e30',
                    'editorBracketMatch.border': '#e8a64e80',
                    'editorWidget.background': '#2a2b30',
                    'editorWidget.border': '#333438',
                    'input.background': '#222327',
                    'input.border': '#333438',
                    'input.foreground': '#c8c9cd',
                    'focusBorder': '#e8a64e80',
                    'list.activeSelectionBackground': '#e8a64e30',
                    'list.hoverBackground': '#ffffff0a',
                    'scrollbar.shadow': '#00000000',
                    'scrollbarSlider.background': '#33343880',
                    'scrollbarSlider.hoverBackground': '#6e7076',
                    'scrollbarSlider.activeBackground': '#6e7076',
                    'minimap.background': '#222327',
                    'editorOverviewRuler.border': '#333438',
                }
            });

            editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: '',
                language: 'plaintext',
                theme: 'notepad-dark',
                fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace",
                fontSize: 13,
                lineHeight: 21,
                tabSize: 4,
                insertSpaces: true,
                wordWrap: 'off',
                minimap: { enabled: false },
                scrollBeyondLastLine: true,
                smoothScrolling: true,
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: 'on',
                renderWhitespace: 'selection',
                bracketPairColorization: { enabled: true },
                guides: { bracketPairs: true, indentation: true },
                padding: { top: 12, bottom: 12 },
                automaticLayout: true,
                multiCursorModifier: 'alt',
                occurrencesHighlight: 'singleFile',
                selectionHighlight: true,
                links: true,
                folding: true,
                foldingStrategy: 'indentation',
                showFoldingControls: 'mouseover',
                suggest: { showWords: false },
                quickSuggestions: false,
                parameterHints: { enabled: false },
                overviewRulerLanes: 0,
            });

            // Override Ctrl+S, Ctrl+O, Ctrl+N, Ctrl+Shift+S
            editor.addAction({
                id: 'save-file',
                label: 'Save File',
                keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS],
                run: () => saveFile()
            });
            editor.addAction({
                id: 'save-file-as',
                label: 'Save File As',
                keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyS],
                run: () => saveFileAs()
            });
            editor.addAction({
                id: 'open-file',
                label: 'Open File',
                keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyO],
                run: () => openFile()
            });
            editor.addAction({
                id: 'new-file',
                label: 'New File',
                keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyN],
                run: () => newFile()
            });
            editor.addAction({
                id: 'close-tab',
                label: 'Close Tab',
                keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyW],
                run: () => { if (activeTabId) closeTab(activeTabId); }
            });

            // Status bar updates
            editor.onDidChangeCursorPosition((e) => {
                const pos = editor.getPosition();
                const sels = editor.getSelections();
                document.getElementById('status-pos').textContent = `Ln ${pos.lineNumber}, Col ${pos.column}`;

                // Selection info
                let selText = '';
                if (sels && sels.length > 1) {
                    selText = `${sels.length} cursors`;
                } else if (sels && sels.length === 1) {
                    const sel = sels[0];
                    if (!sel.isEmpty()) {
                        const model = editor.getModel();
                        const text = model.getValueInRange(sel);
                        const lines = text.split('\n').length;
                        selText = `${text.length} selected` + (lines > 1 ? ` (${lines} lines)` : '');
                    }
                }
                document.getElementById('status-sel').textContent = selText;
            });

            editor.onDidChangeModelContent(() => {
                const tab = getActiveTab();
                if (tab) {
                    tab.content = editor.getValue();
                    updateModified();
                    renderTabs();
                }
                updateStatusBar();
            });

            // Click on editor creates tab if none open
            editor.onDidFocusEditorWidget(() => {
                if (tabs.length === 0) createTab('Untitled', '', null);
            });

            // Populate language selector
            populateLangSelect();

            langSelect.addEventListener('change', () => {
                const tab = getActiveTab();
                if (tab && editor.getModel()) {
                    monaco.editor.setModelLanguage(editor.getModel(), langSelect.value);
                }
            });

            updateStatusBar();
            updateWelcome();

            // Handle window resize
            window.addEventListener('resize', () => editor.layout());
        }

        function populateLangSelect() {
            const languages = monaco.languages.getLanguages()
                .map(l => ({ id: l.id, label: l.aliases?.[0] || l.id }))
                .sort((a, b) => a.label.localeCompare(b.label));

            languages.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.id;
                opt.textContent = l.label;
                langSelect.appendChild(opt);
            });
            langSelect.value = 'plaintext';
        }

        // ── Tab management ──
        function createTab(name, content, handle) {
            const id = ++tabIdCounter;
            tabs.push({ id, name, content, savedContent: content, handle: handle || null });
            renderTabs();
            switchTab(id);
        }

        function switchTab(id) {
            if (activeTabId) {
                const old = tabs.find(t => t.id === activeTabId);
                if (old) old.content = editor.getValue();
            }
            activeTabId = id;
            const tab = tabs.find(t => t.id === id);
            if (tab) {
                const lang = getLangForFile(tab.name);
                const model = monaco.editor.createModel(tab.content, lang);
                const oldModel = editor.getModel();
                editor.setModel(model);
                if (oldModel) oldModel.dispose();

                titleFilename.textContent = tab.name;
                langSelect.value = lang;
                updateModified();
                updateStatusBar();
                updateWelcome();
                editor.focus();
            }
            renderTabs();
        }

        function closeTab(id) {
            const tab = tabs.find(t => t.id === id);
            if (tab) {
                if (activeTabId === id) tab.content = editor.getValue();
                if (tab.content !== tab.savedContent) {
                    if (!confirm(`"${tab.name}" has unsaved changes. Close anyway?`)) return;
                }
            }
            const idx = tabs.findIndex(t => t.id === id);
            tabs.splice(idx, 1);
            if (activeTabId === id) {
                if (tabs.length > 0) {
                    switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
                } else {
                    activeTabId = null;
                    editor.setValue('');
                    titleFilename.textContent = 'Notepad';
                    modifiedDot.classList.remove('show');
                    document.title = 'Notepad';
                    langSelect.value = 'plaintext';
                    updateStatusBar();
                    updateWelcome();
                }
            }
            renderTabs();
        }

        function renderTabs() {
            tabBar.innerHTML = '';
            tabs.forEach(tab => {
                const isActive = tab.id === activeTabId;
                const cur = isActive ? editor.getValue() : tab.content;
                const isMod = cur !== tab.savedContent;
                const el = document.createElement('div');
                el.className = 'tab' + (isActive ? ' active' : '') + (isMod ? ' modified' : '');
                el.innerHTML = `<span class="tab-dot"></span><span>${escHtml(tab.name)}</span><span class="close-tab" data-id="${tab.id}">✕</span>`;
                el.addEventListener('click', (e) => {
                    if (e.target.classList.contains('close-tab')) closeTab(Number(e.target.dataset.id));
                    else switchTab(tab.id);
                });
                tabBar.appendChild(el);
            });
        }

        function getActiveTab() { return tabs.find(t => t.id === activeTabId); }

        function updateModified() {
            const tab = getActiveTab();
            if (tab) {
                const mod = editor.getValue() !== tab.savedContent;
                modifiedDot.classList.toggle('show', mod);
                document.title = (mod ? '● ' : '') + tab.name + ' — Notepad';
            } else {
                modifiedDot.classList.remove('show');
                document.title = 'Notepad';
            }
        }

        function updateWelcome() {
            welcomeEl.classList.toggle('hidden', tabs.length > 0);
        }

        // ── File operations ──
        function newFile() { createTab('Untitled', '', null); }

        async function openFile() {
            if (supportsFS) {
                try {
                    const handles = await window.showOpenFilePicker({ multiple: true });
                    for (const h of handles) {
                        const f = await h.getFile();
                        createTab(f.name, await f.text(), h);
                    }
                } catch (e) { if (e.name !== 'AbortError') console.error(e); }
            } else {
                filePicker.click();
            }
        }

        filePicker.addEventListener('change', async (e) => {
            for (const f of e.target.files) createTab(f.name, await f.text(), null);
            filePicker.value = '';
        });

        async function saveFile() {
            const tab = getActiveTab();
            if (!tab) return;
            tab.content = editor.getValue();
            if (supportsFS && tab.handle) {
                try {
                    const w = await tab.handle.createWritable();
                    await w.write(tab.content);
                    await w.close();
                    tab.savedContent = tab.content;
                    updateModified(); renderTabs();
                } catch (e) { if (e.name !== 'AbortError') console.error(e); }
            } else {
                await saveFileAs();
            }
        }

        async function saveFileAs() {
            const tab = getActiveTab();
            if (!tab) return;
            tab.content = editor.getValue();
            if (supportsFS) {
                try {
                    const ext = getExtension(tab.name);
                    const handle = await window.showSaveFilePicker({
                        suggestedName: tab.name,
                        types: [{ description: 'Text file', accept: { 'text/plain': ext ? ['.' + ext] : ['.txt'] } }]
                    });
                    const w = await handle.createWritable();
                    await w.write(tab.content);
                    await w.close();
                    tab.handle = handle;
                    tab.name = handle.name;
                    tab.savedContent = tab.content;
                    titleFilename.textContent = tab.name;
                    // Update language mode
                    const lang = getLangForFile(tab.name);
                    monaco.editor.setModelLanguage(editor.getModel(), lang);
                    langSelect.value = lang;
                    updateModified(); updateStatusBar(); renderTabs();
                } catch (e) { if (e.name !== 'AbortError') console.error(e); }
            } else {
                const blob = new Blob([tab.content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = tab.name || 'untitled.txt'; a.click();
                URL.revokeObjectURL(url);
                tab.savedContent = tab.content;
                updateModified(); renderTabs();
            }
        }

        function updateStatusBar() {
            if (!editor) return;
            const model = editor.getModel();
            if (!model) return;
            const val = model.getValue();
            document.getElementById('status-lines').textContent = `${model.getLineCount()} lines`;
            document.getElementById('status-size').textContent = formatBytes(new Blob([val]).size);
        }

        function toggleWrap() {
            wordWrap = !wordWrap;
            editor.updateOptions({ wordWrap: wordWrap ? 'on' : 'off' });
            document.getElementById('wrap-btn').style.color = wordWrap ? 'var(--accent)' : '';
        }

        function toggleMinimap() {
            minimapEnabled = !minimapEnabled;
            editor.updateOptions({ minimap: { enabled: minimapEnabled } });
            document.getElementById('minimap-btn').style.color = minimapEnabled ? 'var(--accent)' : '';
        }

        // ── Drag & drop ──
        let dragCounter = 0;
        document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('show'); });
        document.addEventListener('dragleave', (e) => { e.preventDefault(); if (--dragCounter === 0) dropOverlay.classList.remove('show'); });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', async (e) => {
            e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('show');
            for (const f of e.dataTransfer.files) {
                try { createTab(f.name, await f.text(), null); } catch (err) { console.error(err); }
            }
        });

        // ── Helpers ──
        function getExtension(name) { const p = (name || '').split('.'); return p.length > 1 ? p.pop().toLowerCase() : ''; }
        function formatBytes(b) { if (b === 0) return '0 B'; const k = 1024, s = ['B','KB','MB','GB'], i = Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]; }
        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    </script>
</body>
</html>
